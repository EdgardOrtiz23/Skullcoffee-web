name: HTML Validation (Linting)

# El workflow se ejecuta en 'desarrollo' cada vez que alguien hace un push
on:
  push:
    branches:
      - desarrollo

jobs:
  validate_html:
    # Ejecuta el job en un ambiente Ubuntu reciente
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Descarga el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # Paso 2: Valida la sintaxis HTML
      # Usaremos un validador estándar que revisa los archivos HTML
      - name: HTML Validation
        uses: a7ul/html-proofer-action@v1.0.0
        with:
          # Archivos que queremos validar (todos los .html que no estén en node_modules)
          directory: "./"
          arguments: "--ext .html --allow-hash-href"
