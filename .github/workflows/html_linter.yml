name: HTML Validation (Linting)

on:
  push:
    branches:
      - desarrollo

jobs:
  validate_html:
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Descarga el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # --- AQUÍ ESTÁ LA CORRECCIÓN DE LA ALINEACIÓN ---
      # La línea de 'name' DEBE estar alineada con la línea de 'name' de arriba
      - name: HTML Validation
        # Usa la action estable que definimos en el Paso 24
        uses: chialab/html-checker-action@v1 
        with:
          files: '/*.html' # Valida todos los archivos HTML en el proyecto
          options: --clean-names 